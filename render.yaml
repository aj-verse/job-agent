databases:
  - name: job-agent-db
    plan: free
    databaseName: job_agent
    user: job_agent_user

services:
  - type: web
    name: job-agent-web
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false # Render will prompt you to enter/generate your APP_KEY during setup
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: job-agent-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_SCRIPTS
        value: "1"
      - key: SCHEDULER_API_KEY
        generateValue: true # Render will automatically generate a secure random API key for the scheduler webhook
